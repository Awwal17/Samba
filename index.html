<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awwal's Projects</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #050505; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        h1 { font-size: 28px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; font-weight: 900; }
        p { color: #666; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; width: 100%; max-width: 800px; }
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 25px; border-radius: 8px; text-decoration: none; color: #fff; transition: all 0.3s ease; text-align: center; }
        .card:hover { border-color: #E25B26; transform: translateY(-4px); box-shadow: 0 10px 25px rgba(226, 91, 38, 0.15); }
        .card h3 { font-size: 16px; letter-spacing: 1.5px; text-transform: uppercase; color: #ffffff; }
        .card span { font-size: 11px; color: #E25B26; letter-spacing: 1px; display: block; margin-top: 6px; }
    </style>
</head>
<body>
    <h1>PROJECT ARCHIVE</h1>
    <p>Select a live preview</p>

        </a>
    </div>
</body>
</html>
